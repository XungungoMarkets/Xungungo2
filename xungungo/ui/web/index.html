<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Xungungo Chart</title>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; background: #0b0d14; }
    #chart { width: 100%; height: 100%; }
    #overlay {
      position: absolute; left: 0; top: 0; right: 0; bottom: 0;
      display: none; align-items: center; justify-content: center;
      color: #e6e6e6; font-family: sans-serif; font-size: 14px;
      background: rgba(11,13,20,0.85); padding: 20px; text-align: center;
      white-space: pre-line;
    }
  </style>

  <script>
    window.XUNGUNGO_DEBUG = false;
  </script>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script src="https://unpkg.com/lightweight-charts@5.1.0/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://unpkg.com/lightweight-charts@5.1.0/dist/plugins/series-markers/series-markers.js"></script>
  <script type="module" src="./advanced_renderer.js"></script>
  <script defer src="./chart.js"></script>
</head>
<body>
  <div id="chart"></div>
  <div id="overlay"></div>
</body>
</html>
